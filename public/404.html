<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Paywise Beta</title>
    <script type="text/javascript">
      // GitHub Pages SPA Hash Redirect
      // If a user goes to www.paywiseapp.com/beta, this handles the redirect to the HashRouter version:
      // www.paywiseapp.com/#/beta
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      
      // Avoid infinite loops
      if (path !== '/') {
        window.location.replace(window.location.origin + window.location.pathname.replace(path, '') + '/#' + path + search + hash);
      } else {
        // If it's just the root and somehow triggered 404, just go to home
        window.location.replace(window.location.origin + '/#/' + search + hash);
      }
    </script>
  </head>
  <body>
    <div style="font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #0f172a; color: white;">
      <h1 style="margin-bottom: 20px;">Redirecting to Beta...</h1>
      <div style="width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite;"></div>
      <style>
        @keyframes spin { to { transform: rotate(360deg); } }
      </style>
    </div>
  </body>
</html>
